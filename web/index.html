<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Orchestrator Dashboard</title>
<!-- Marked.js for Markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --border: #475569;
    --text: #f1f5f9;
    --text-dim: #94a3b8;
    --accent: #3b82f6;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --orange: #f97316;
    --purple: #a855f7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header h1 span { color: var(--accent); }
  .status-bar {
    display: flex;
    gap: 24px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .status-item strong { color: var(--text); font-size: 18px; }
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .full-width { grid-column: 1 / -1; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .card-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-header h2 { font-size: 16px; font-weight: 600; }
  .card-body { padding: 0; }
  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .badge-running { background: rgba(34,197,94,.15); color: var(--green); }
  .badge-pending { background: rgba(234,179,8,.15); color: var(--yellow); }
  .badge-completed { background: rgba(59,130,246,.15); color: var(--accent); }
  .badge-failed { background: rgba(239,68,68,.15); color: var(--red); }
  .badge-cancelled { background: rgba(249,115,22,.15); color: var(--orange); }
  .badge-stopped { background: rgba(148,163,184,.15); color: var(--text-dim); }
  .badge-starting { background: rgba(168,85,247,.15); color: var(--purple); }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    padding: 10px 16px;
    font-size: 11px;
    text-transform: uppercase;
    color: var(--text-dim);
    background: var(--surface2);
    font-weight: 600;
    letter-spacing: .5px;
  }
  td {
    padding: 12px 16px;
    font-size: 13px;
    border-top: 1px solid var(--border);
  }
  tr:hover td { background: rgba(59,130,246,.05); }
  .mono { font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 12px; }
  .btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface2);
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
  }
  .btn:hover { background: var(--accent); border-color: var(--accent); }
  .btn-danger:hover { background: var(--red); border-color: var(--red); }
  .btn-sm { padding: 3px 8px; font-size: 11px; }
  .btn-icon {
    padding: 3px 6px;
    font-size: 14px;
    line-height: 1;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 4px;
    transition: all .15s;
  }
  .btn-icon:hover { background: var(--surface); color: var(--text); }
  .btn-icon.danger:hover { background: rgba(239,68,68,.2); color: var(--red); }
  .empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
  }
  .pulse {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }
  .pulse-green { background: var(--green); }
  .pulse-yellow { background: var(--yellow); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }
  .log-area {
    max-height: 300px;
    overflow-y: auto;
    padding: 12px 16px;
    font-size: 13px;
    line-height: 1.6;
  }
  .log-area::-webkit-scrollbar { width: 6px; }
  .log-area::-webkit-scrollbar-track { background: var(--surface); }
  .log-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .time-ago { color: var(--text-dim); font-size: 11px; }
  .role-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    background: rgba(168,85,247,.15);
    color: var(--purple);
    margin-left: 4px;
  }
  .task-id-label {
    font-size: 10px;
    color: var(--text-dim);
    font-family: 'Cascadia Code', 'Consolas', monospace;
  }
  .agent-actions { display: flex; gap: 2px; }

  /* Markdown rendering in messages */
  .md-content { color: var(--text); font-size: 13px; white-space: pre-wrap; word-break: break-word; }
  .md-content.rendered { white-space: normal; }
  .md-content p { margin: 4px 0; }
  .md-content code {
    background: var(--surface);
    padding: 1px 4px;
    border-radius: 3px;
    font-family: 'Cascadia Code', 'Consolas', monospace;
    font-size: 12px;
    color: var(--green);
  }
  .md-content pre {
    background: var(--bg);
    padding: 10px 14px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 6px 0;
    border: 1px solid var(--border);
  }
  .md-content pre code {
    background: transparent;
    padding: 0;
    color: var(--text);
  }
  .md-content ul, .md-content ol { padding-left: 20px; margin: 4px 0; }
  .md-content li { margin: 2px 0; }
  .md-content strong { color: var(--text); }
  .md-content em { color: var(--text-dim); }
  .md-content blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 12px;
    margin: 6px 0;
    color: var(--text-dim);
  }
  .md-content a { color: var(--accent); text-decoration: underline; }
  .md-content h1, .md-content h2, .md-content h3 {
    margin: 8px 0 4px;
    font-weight: 600;
  }
  .md-content h1 { font-size: 18px; }
  .md-content h2 { font-size: 16px; }
  .md-content h3 { font-size: 14px; }

  @media (max-width: 900px) {
    .container { grid-template-columns: 1fr; }
    .header { flex-direction: column; gap: 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1><span>◆</span> Agent Orchestrator</h1>
  <div class="status-bar">
    <div class="status-item">Задачи: <strong id="total-tasks">0</strong></div>
    <div class="status-item">Агенты: <strong id="total-agents">0</strong></div>
    <div class="status-item">Активные: <strong id="active-agents">0</strong></div>
    <div class="status-item" id="last-update">—</div>
  </div>
</div>

<div class="container">
  <!-- Agents Card -->
  <div class="card">
    <div class="card-header">
      <h2>Агенты</h2>
    </div>
    <div class="card-body">
      <table>
        <thead><tr><th>Роль</th><th>Имя</th><th>PID</th><th>Задача</th><th>Статус</th><th>Действия</th></tr></thead>
        <tbody id="agents-body"></tbody>
      </table>
      <div id="agents-empty" class="empty" style="display:none">Нет запущенных агентов</div>
    </div>
  </div>

  <!-- Tasks Card -->
  <div class="card">
    <div class="card-header">
      <h2>Задачи</h2>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm" onclick="clearTasks()">Очистить</button>
      </div>
    </div>
    <div class="card-body">
      <table>
        <thead><tr><th>ID</th><th>Заголовок</th><th>Приоритет</th><th>Статус</th><th>Агент</th></tr></thead>
        <tbody id="tasks-body"></tbody>
      </table>
      <div id="tasks-empty" class="empty" style="display:none">Нет задач</div>
    </div>
  </div>

  <!-- Orchestrator Messages -->
  <div class="card full-width">
    <div class="card-header">
      <h2>Сообщения оркестратора</h2>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm" onclick="clearOrchestratorMessages()" title="Очистить только сообщения оркестратора">Очистить орк.</button>
        <button class="btn btn-sm" onclick="clearMessages()" title="Очистить все сообщения">Очистить всё</button>
        <button class="btn btn-sm" onclick="refreshAll()">Обновить</button>
      </div>
    </div>
    <div class="card-body">
      <div class="log-area" id="activity-feed"></div>
    </div>
  </div>

  <!-- All Messages -->
  <div class="card full-width">
    <div class="card-header">
      <h2>Все сообщения</h2>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm" onclick="clearMessages()">Очистить все</button>
        <button class="btn btn-sm" onclick="refreshAll()">Обновить</button>
      </div>
    </div>
    <div class="card-body">
      <div class="log-area" id="messages-log"></div>
    </div>
  </div>
</div>

<!-- Agent Messages Modal -->
<div id="agent-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:1000;justify-content:center;align-items:center">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;max-width:800px;width:90%;max-height:80vh;overflow:hidden;display:flex;flex-direction:column">
    <div class="card-header">
      <h2 id="modal-title">Сообщения агента</h2>
      <button class="btn btn-sm" onclick="closeModal()">✕ Закрыть</button>
    </div>
    <div class="card-body" style="overflow-y:auto;max-height:70vh;padding:16px">
      <div id="agent-messages-content"></div>
    </div>
  </div>
</div>

<script>
const API = 'http://127.0.0.1:8765/api';

// Configure Marked.js
if (typeof marked !== 'undefined') {
  marked.setOptions({
    breaks: true,
    gfm: true,
  });
}

function renderMarkdown(text) {
  if (typeof marked !== 'undefined') {
    return marked.parse(text);
  }
  // Fallback: escape code blocks
  return text
    .replace(/```[\s\S]*?```/g, '<pre><code>$&</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>');
}

function statusBadge(s) {
  return `<span class="badge badge-${s}">${s}</span>`;
}

function timeAgo(ts) {
  if (!ts) return '—';
  const diff = Math.floor(Date.now() / 1000 - ts);
  if (diff < 60) return `${diff}с назад`;
  if (diff < 3600) return `${Math.floor(diff/60)}м назад`;
  return `${Math.floor(diff/3600)}ч назад`;
}

function priorityLabel(p) {
  const colors = { high: 'var(--red)', normal: 'var(--accent)', low: 'var(--text-dim)' };
  return `<span style="color:${colors[p] || colors.normal};font-weight:600">${p}</span>`;
}

function roleBadge(role) {
  if (!role || !role.role) return '';
  return `<span class="role-badge">${role.role}</span>`;
}

async function refreshAll() {
  try {
    const [agentsRes, tasksRes, msgsRes, summaryRes] = await Promise.all([
      fetch(`${API}/agents`),
      fetch(`${API}/tasks`),
      fetch(`${API}/messages`),
      fetch(`${API}/summary`),
    ]);
    const agents = await agentsRes.json();
    const tasks = await tasksRes.json();
    const messages = await msgsRes.json();
    const summary = await summaryRes.json();

    // Summary
    document.getElementById('total-tasks').textContent = summary.total_tasks;
    document.getElementById('total-agents').textContent = summary.total_agents;
    document.getElementById('active-agents').textContent = summary.active_agents;
    document.getElementById('last-update').textContent = 'Обновлено: ' + new Date().toLocaleTimeString('ru');

    // Agents
    const ab = document.getElementById('agents-body');
    const ae = document.getElementById('agents-empty');
    if (agents.length === 0) { ab.innerHTML = ''; ae.style.display = 'block'; }
    else {
      ae.style.display = 'none';
      ab.innerHTML = agents.map(a => {
        const role = a.role || {};
        const taskId = a.task_id || a.current_task;
        const taskDisplay = taskId ? `<div class="mono" style="max-width:200px;word-break:break-all;white-space:normal" title="${taskId}">${taskId}</div>` : '<span class="mono" style="color:var(--text-dim)">—</span>';
        const pidDisplay = a.pid ? `<span class="mono">${a.pid}</span>` : '<span class="mono" style="color:var(--text-dim)">—</span>';
        return `<tr>
          <td>${roleBadge(role)}</td>
          <td>${a.name}</td>
          <td>${pidDisplay}</td>
          <td>${taskDisplay}</td>
          <td>${a.status === 'running' ? '<span class="pulse pulse-green"></span>' : '<span class="pulse pulse-yellow"></span>'} ${statusBadge(a.status)}</td>
          <td>
            <div class="agent-actions">
              <button class="btn-icon" onclick="showAgentMessages('${a.id}')" title="Сообщения">Msg</button>
              <button class="btn-icon" onclick="stopAgent('${a.id}')" title="Остановить">Stop</button>
              <button class="btn-icon danger" onclick="deleteAgent('${a.id}')" title="Удалить">Del</button>
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    // Tasks
    const tb = document.getElementById('tasks-body');
    const te = document.getElementById('tasks-empty');
    if (tasks.length === 0) { tb.innerHTML = ''; te.style.display = 'block'; }
    else {
      te.style.display = 'none';
      tb.innerHTML = tasks.map(t => `<tr>
        <td class="mono">${t.id}</td>
        <td title="${t.description || ''}">${t.title}</td>
        <td>${priorityLabel(t.priority)}</td>
        <td>${statusBadge(t.status)}</td>
        <td class="mono">${t.assigned_to || '—'}</td>
      </tr>`).join('');
    }

    // Messages - Activity Feed (orchestrator messages only)
    const feed = document.getElementById('activity-feed');
    const orchestratorMsgs = messages.filter(m =>
      m.from_agent === 'orchestrator'
    );
    feed.innerHTML = orchestratorMsgs.map(m => {
      const toName = m.to_agent_name || m.to_agent || 'broadcast';
      const to = m.to_agent ? `→ <strong>${toName}</strong>` : '<span style="color:var(--purple)">→ broadcast</span>';
      const bgColor = 'rgba(59,130,246,.1)';
      const borderColor = 'var(--accent)';
      const renderedContent = renderMarkdown(m.content);
      return `<div style="margin-bottom:8px;padding:8px 12px;background:${bgColor};border-left:3px solid ${borderColor};border-radius:6px">
        <span class="time-ago">${timeAgo(m.timestamp)}</span>
        &nbsp; <strong style="color:var(--accent)">orchestrator</strong> ${to}<br>
        <div class="md-content rendered">${renderedContent}</div>
      </div>`;
    }).join('') || '<div class="empty">Нет сообщений</div>';

    // Messages - All messages
    const ml = document.getElementById('messages-log');
    ml.innerHTML = messages.map(m => {
      const fromName = m.from_agent_name || m.from_agent || '<system>';
      const toName = m.to_agent_name || m.to_agent || 'broadcast';
      const to = m.to_agent ? `→ <strong>${toName}</strong>` : '<span style="color:var(--purple)">→ broadcast</span>';
      const renderedContent = renderMarkdown(m.content);
      return `<div style="margin-bottom:8px;padding:8px 12px;background:var(--surface2);border-radius:6px">
        <span class="time-ago">${timeAgo(m.timestamp)}</span>
        &nbsp; <strong style="color:var(--accent)">${fromName}</strong> ${to}<br>
        <div class="md-content rendered">${renderedContent}</div>
      </div>`;
    }).join('');

  } catch(e) {
    console.error('Refresh error:', e);
  }
}

async function clearTasks() {
  if (!confirm('Очистить все задачи?')) return;
  await fetch(`${API}/tasks/clear`, { method: 'POST' });
  refreshAll();
}

async function clearMessages() {
  if (!confirm('Очистить ВСЕ сообщения?')) return;
  await fetch(`${API}/messages/clear`, { method: 'POST' });
  refreshAll();
}

async function clearOrchestratorMessages() {
  if (!confirm('Очистить только сообщения оркестратора? Сообщения агентов останутся.')) return;
  await fetch(`${API}/messages/clear/orchestrator`, { method: 'POST' });
  refreshAll();
}

async function stopAgent(agentId) {
  if (!confirm('Остановить агента?')) return;
  await fetch(`${API}/agents/${agentId}/stop`, { method: 'POST' });
  refreshAll();
}

async function deleteAgent(agentId) {
  if (!confirm('Удалить агента? Это остановит процесс и удалит из реестра.')) return;
  await fetch(`${API}/agents/${agentId}/delete`, { method: 'POST' });
  refreshAll();
}

async function showAgentMessages(agentId) {
  try {
    const res = await fetch(`${API}/messages/agent/${agentId}`);
    const msgs = await res.json();

    document.getElementById('modal-title').textContent = `Сообщения агента ${agentId}`;
    const content = document.getElementById('agent-messages-content');

    if (msgs.length === 0) {
      content.innerHTML = '<div class="empty">Нет сообщений</div>';
    } else {
      content.innerHTML = msgs.map(m => {
        const isFromAgent = m.from_agent === agentId;
        const bgColor = isFromAgent ? 'rgba(34,197,94,.1)' : 'var(--surface2)';
        const borderColor = isFromAgent ? 'var(--green)' : 'var(--accent)';
        const arrow = isFromAgent ? 'От агента' : 'К агенту';
        const fromName = m.from_agent_name || m.from_agent || '<system>';
        const toName = m.to_agent_name || m.to_agent || 'broadcast';
        const renderedContent = renderMarkdown(m.content);

        return `<div style="margin-bottom:12px;padding:10px 14px;background:${bgColor};border-left:3px solid ${borderColor};border-radius:6px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <span class="time-ago">${timeAgo(m.timestamp)}</span>
            <span style="font-size:11px;color:var(--text-dim)">${arrow}</span>
          </div>
          <div style="margin-bottom:4px">
            <strong style="color:var(--accent)">${fromName}</strong>
            → <strong>${toName}</strong>
            ${m.task_id ? `<span class="task-id-label" style="margin-left:8px">task: ${m.task_id}</span>` : ''}
          </div>
          <div class="md-content rendered">${renderedContent}</div>
        </div>`;
      }).join('');
    }

    document.getElementById('agent-modal').style.display = 'flex';
  } catch(e) {
    console.error('Failed to load agent messages:', e);
  }
}

function closeModal() {
  document.getElementById('agent-modal').style.display = 'none';
}

// Close modal on Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// Close modal on backdrop click
document.getElementById('agent-modal').addEventListener('click', (e) => {
  if (e.target.id === 'agent-modal') closeModal();
});

// Initial load
refreshAll();
// Auto-refresh every 3 seconds
setInterval(refreshAll, 3000);
</script>
</body>
</html>
